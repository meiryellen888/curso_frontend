<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Aula 06 - Galeria Responsiva </title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- Div que centraliza toda a galeria -->
    <div cass="gallery.container">
        <h1> Galeria de Viagens</h1>

        <!-- Grid da Galeria -->
        <!-- Container flex que usa o flex-wrap para criar um grid resposivel usando flexbox -->
        <div class="grid">
            <div class="item">

                <img src="./img/paris.png" alt="Paris">
                <!--  Overlay : Camada de texto sobre a imagem -->
                  <div class="overlay"> Paris</div>
            </div>

            <div class="item">
                <img src="./img/bolivia.png" alt=" Bolivia">
                <div class="overlay"> Bolivia</div>

            </div>

                   <div class="item">
                <img src="./img/belem_PA.png" alt=" Belem PA">
                <div class="overlay"> Belem PA</div>
            </div>

              <div class="item">
                <img src="./img/japao.png" alt=" Japao">
                <div class="overlay"> Japão</div>
            </div>

              <div class="item">
                <img src="./img/chile.png" alt=" Chile">
                <div class="overlay"> Chile</div>
            </div>

              <div class="item">
                <img src="./img/italia.png" alt=" Italia">
                <div class="overlay"> Roma  </div>
            </div>
        
        
        
        </div>

    </div>
    
</body>
</html>
