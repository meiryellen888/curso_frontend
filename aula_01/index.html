<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 - Pagina de boas vindas</title>
    <!-- Link que liga a pagina html ao arquivo css e aplica os estilos visuais -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Cabeçalho da pagina (Header) -->
    <!-- Seção semântica usada para titulos principal e conteúdo do topo -->
    <header>

    <!-- Titulo principal (h1) - deve haver apenas UM por pagina -->
     <h1>Bem-vindos ao Nosso Curso!</h1>
    </header>   

    <!-- Conteudo Principal (Main) -->
     <!-- Seção semantica para o conteudo/principal da pagina -->
     <main>
        <!-- Imagem de boas vindas -->
         <!-- a propriedade scr é o caminho da imagem e o alt seria o texto alternativopara aparecer no lugar da imagem caso ela falhe -->
        <img src="./img/boas_vindas.jpg" alt="Imagem de boas vindas">
    
        <!-- Parágrafo de introdução -->
        <p> Estamos muito felizes em ter você aqui. Prepare-se para mergulhar no mundo do desenvolvimento web! </p>

        <!-- Tag a é usada para redirecionar para outra pagina ou arquivo -->
        <a class="button" href="#"> Começar Agora</a> 
     </main>

     <!-- Rodapé da pagina (footer) -->
      <footer>
        <!-- Seção semantica para informações de rodapé (copyright, links, etc) -->
        <p>&copy; 2026 Meiryellen Proença Desenvolvedor WEB Front-end  </p>
      </footer>

</body>
</html>
