
<!-- Aula 04 - Formulários de Inscrição
 Objetivo: Criar um formulário responsive e bem estruturado usando HTML semântico -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Aula 04 - Formulário de Inscrição </title>
    <link rel="stylesheet" href="./css/style.css" />


</head>
<body>
    <!-- WRAPPER DO FROMULÁRIO -->
     <!-- DIV container que centraliza e estiliza Formulario -->
    <div class="form-wrapper">

        <!-- Formulario Principal -->
         <!-- Tag semântica <form> indica que é um Formulário
            Atributos utilizados 
            -method: como enviar os dados ( GET via url / ou POST não vizualiza e tela)
            - action: para onde enviar os dados  -->

        <form class="evnt-form">

            <!-- Titulo do formulario - Grupo Nome -->
            <h2> Inscrição Tech Summit</h2>

            <!-- Grupo de Formulario -->
             <!-- Cada input é envolvido em uma div (form-group) para melhor organização-->
            <div class="form-group">
                <!-- Label - Rótulo -->
                 <!-- Importante para acessibilidade o aributo (for) conectar ao id do input
                  Quando o usuario clica no label, o input recebe o foco -->
                <label for="nome"> Nome Completo </label>

                <!-- input type=text (campo de texto) -->
                 <!-- id: identificado unico (conecta ele com label 
                  type: tipo de entrada de dados (text= texto simples) 
                  placeholder: texto de sugestão (desaparece ao digitar)
                  required: campo obrigatório (não permite enviar o formulário com campo vazio) -->
                <input type="text" id="nome" placeholder="nome completo" required/>

            </div>
            <!-- Grupo de email -->
            <div class="form-group">
                <label for="email"> E-mail </label>
                <input type="email" id="email" placeholder="seuemail@email.com"> 

            </div>

            <!-- Grupo 3 Select (seleção) -->
             <div class="form-group">
                <label for="area"> Area de Interesse</label>

              <!-- permite que o usuario escolha uma opção de uma linha pré-definida -->
                <select id="area">

                      <!-- Opções de Dropdown -->
                       <!-- Value: valor enviado no formulario (não é o que o usuario ve) -->
                    <option value=""> Selecione uma opção </option>
                    <option value="frontend"> Front-end </option>
                    <option value="backend"> Back-end </option>
                    <option value="design"> UI/UX Design </option>
                </select>

                </div>
                
                <!-- grupo de Textarea (textos longos) -->
                <div class="form-group">
                    <label for="msg"> Por que quer participar </label>
                    <!-- TextArea  -->
                     <!-- Permite entrada de textos em multipas lihas atributo rows define a altura da linha inicial (4 linhas) -->
                    <textarea id="msg" rows="4" ></textarea>

                </div>

                <!-- Botõ de enviar -->
                 <!--  type: "submit" faz com que o formulario seja enviado ao clicar o evento de envio pode ser capturado com JavaScript para validação adicional -->
                <button type="submit"> Enviar Inscrição</button>

             </div>
        </form>
    </div>

</body>
</html>
