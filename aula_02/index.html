<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8"/>
    <meta name=" viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aula 02 - Cartão de Produto</title>
    <link rel="stylesheet" href="./css/style.css"/>

    </head>

    <body>

        <main>



            <div class="container">
 
                
                <div class="product-card">
 
                    <img src="./img/3310.jpg" alt="Produto" />

                 <!-- Conteudo interno do cartão-->
                    <div class="card-content">
                
                        <!-- Titulo do produto-->
                        <h3>Nokia</h3>

                  
                        <!-- Descrição do produto-->
                        <p> Uma relíquia do mercado, início da era tecnológica </p>

                        <!-- preço do produto-->
                        <span class="price"> RE2.999,00</span>

                        <a href="#" class="buy-btn"> Comprar Agora</a>


                    </div>

                </div>
        
            </div>

        </main>

    </body>

</html>
